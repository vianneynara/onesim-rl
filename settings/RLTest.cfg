#===========================================================================
# SCENARIO CONFIGURATION
#===========================================================================

Scenario.name = RLTest
Scenario.simulateConnections = true
Scenario.updateInterval = 0.1
Scenario.endTime = 86400

# RL EPISODES
Scenario.episodes = 50


#===========================================================================
# INTERFACE SETTINGS
#===========================================================================

btInterface.type = SimpleBroadcastInterface
btInterface.transmitSpeed = 250k
btInterface.transmitRange = 10

highspeedInterface.type = SimpleBroadcastInterface
highspeedInterface.transmitSpeed = 10M
highspeedInterface.transmitRange = 1000


#===========================================================================
# HOST GROUPS
#===========================================================================

Scenario.nrofHostGroups = 2


#===========================================================================
# COMMON GROUP SETTINGS
#===========================================================================

Group.movementModel = ShortestPathMapBasedMovement
Group.router = EpidemicRouter
Group.bufferSize = 5M
Group.waitTime = 0,120

Group.nrofInterfaces = 1
Group.interface1 = btInterface

Group.speed = 1,5
Group.msgTtl = 300


#===========================================================================
# RL AGENT GROUP
#===========================================================================

Group1.groupID = S
Group1.nrofHosts = 1
Group1.movementModel = RLMovementModel
Group1.speed = 1,5


#===========================================================================
# TARGET GROUP
#===========================================================================

Group2.groupID = T
Group2.nrofHosts = 100
Group2.movementModel = StationaryGaussian
Group2.speed = 0,0


#===========================================================================
# EVENTS SETTINGS
#===========================================================================

Events.nrof = 1

Events1.class = MessageEventGenerator
Events1.interval = 25,35
Events1.size = 500k,1M

# safer host range
Events1.hosts = 0,99

Events1.prefix = M


#===========================================================================
# MOVEMENT SETTINGS
#===========================================================================

MovementModel.rngSeed = 0
MovementModel.worldSize = 750,750
MovementModel.warmup = 1000


#===========================================================================
# MAP DATA
#===========================================================================

MapBasedMovement.nrofMapFiles = 4

MapBasedMovement.mapFile1 = data/spatial/roads.wkt
MapBasedMovement.mapFile2 = data/spatial/main_roads.wkt
MapBasedMovement.mapFile3 = data/spatial/pedestrian_paths.wkt
MapBasedMovement.mapFile4 = data/spatial/shops.wkt


#===========================================================================
# RL AGENT SETTINGS
#===========================================================================

RLAgent.behaviorPolicy = mcrltest.policy.EpsilonGreedyPolicy
RLAgent.rlModel = mcrltest.qModel.QLearningModel

RLAgent.targetPrefix = T

RLAgent.stepPenalty = 0.01
RLAgent.foundReward = 10

RLAgent.agentSpeed = 10.0
RLAgent.targetCooldown = 0


#===========================================================================
# RL MODEL SETTINGS
#===========================================================================

RLModel.learningRate = 0.1
RLModel.discountFactor = 0.9
RLModel.initialQValue = 0.0


#===========================================================================
# QTABLE SETTINGS
#===========================================================================

QTable.nrofAction = 2
QTable.useVisitCount = true


# PERSISTENCE
QTable.enablePersistence = true
QTable.fileFormat = json
QTable.fileName = qtable


#===========================================================================
# POLICY SETTINGS
#===========================================================================

BehaviorPolicy.EpsilonGreedy.epsilon = 0.9
BehaviorPolicy.EpsilonGreedy.epsilonDecay = 0.995
BehaviorPolicy.EpsilonGreedy.minEpsilon = 0.05


#===========================================================================
# REPORT SETTINGS
#===========================================================================

Report.nrofReports = 2
Report.warmup = 0
Report.reportDir = reports/

Report.report1 = MessageStatsReport
Report.report2 = ContactTimesReport


#===========================================================================
# ROUTER SETTINGS
#===========================================================================

ProphetRouter.secondsInTimeUnit = 30

SprayAndWaitRouter.nrofCopies = 6
SprayAndWaitRouter.binaryMode = true


#===========================================================================
# OPTIMIZATION
#===========================================================================

Optimization.cellSizeMult = 5
Optimization.randomizeUpdateOrder = true


#===========================================================================
# GUI SETTINGS
#===========================================================================

GUI.UnderlayImage.fileName = data/spatial/helsinki_underlay.png
GUI.UnderlayImage.offset = 64,20
GUI.UnderlayImage.scale = 4.75
GUI.UnderlayImage.rotate = -0.015

GUI.EventLogPanel.nrofEvents = 100


#===========================================================================
# NODE TRAILS
#===========================================================================

GUI.processNodeTrails = true
GUI.nodeTrailEnabled = true
GUI.nodeTrailLength = 50
GUI.nodeTrailColor = #FFA500
GUI.nodeTrailFadeEnabled = false