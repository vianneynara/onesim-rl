#===========================================================================
# SCENARIO CONFIGURATION
#===========================================================================
[ Scenario ]
Scenario.name = RandomSearch-amm@MCMovementEnd-tmm@StationaryGaussian-episode@%%EpisodicPersistenceManager.episodeNumber%%
Scenario.simulateConnections = true
Scenario.updateInterval = 1
# 700k seconds (~8.1 days)
Scenario.endTime = 604800 # 7 days
# Scenario.endTime = 86400 # 1 day
Scenario.nrofHostGroups = 2

[ QUICK REFERENCE ]
# Group2.movementModel = StationaryClustered
# MovementModel.rngSeed = 0

Group2.movementModel = StationaryClustered
MovementModel.rngSeed = 1

# Group2.movementModel = StationaryPoisson
# MovementModel.rngSeed = 0

# Group2.movementModel = StationaryPoisson
# MovementModel.rngSeed = 1

#===========================================================================
# INTERFACE SPECIFIC SETTINGS
#===========================================================================
# type          : which interface class the interface belongs to
# For different types, the sub-parameters are interface-specific
# For SimpleBroadcastInterface, the parameters are:
# transmitSpeed : transmit speed of the interface (bytes per second)
# transmitRange : range of the interface (meters)

# btInterface.type = SimpleBroadcastInterface
# btInterface.transmitSpeed = 250k
# btInterface.transmitRange = 10

highspeedInterface.type = SimpleBroadcastInterface
highspeedInterface.transmitSpeed = 10M
highspeedInterface.transmitRange = 10


# targetInterface.type = SimpleBroadcastInterface
# targetInterface.transmitSpeed = 10M
# targetInterface.transmitRange = 1
#
# agentInterface.type = SimpleBroadcastInterface
# agentInterface.transmitSpeed = 10M
# agentInterface.transmitRange = 10

#===========================================================================
# GROUP SPECIFIC SETTINGS
#===========================================================================
[ Group specific parameters' descriptions ]
# groupID       : Group's identifier
# nrofHosts     : number of hosts in the group
# movementModel : movement model class
# waitTime      : min and max wait times (seconds)
# speed         : min and max speeds (m/s)
# bufferSize    : message buffer size (bytes)
# router        : router class name

[ Common settings (for all groups) ]
Group.movementModel = StationaryClustered
Group.router = EpidemicRouter
# DecisionEngineRouter.decisionEngine = SearchingAgentRouter
Group.bufferSize = 100M
Group.transmitRange = 10
Group.transmitSpeed = 100k              # Transmit speed of 100 kBps
Group.waitTime = 0, 0
Group.speed = 0.5, 0.5
# Group.msgTtl = 300
Group.nrofHosts = 101
Group.interface1 = highspeedInterface

[ Stationary Clustered Movement ]
StationaryClustered.alpha = 0.5
StationaryClustered.cluster = 10, 10
StationaryClustered.sigma = 25.0, 50.0

[ Group 1: Agents ]
Group1.groupID = A
Group1.nrofHosts = 1
# Group1.router = DecisionEngineRouter
Group1.movementModel = rl.MCMovementEnd
# Group1.interface1 = agentInterface

[ Group 2: Target Nodes ]
Group2.groupID = T
Group2.nrofHosts = 100
# Group2.interface1 = targetInterface

# [ Group 3 ]
# Group3.groupID = C
# Group3.nrofHosts = 1

#===========================================================================
# REINFORCEMENT LEARNING SETTINGS
#===========================================================================
[ MCMovementEnd settings ]
MCMovementEnd.behaviorPolicy = movement.rl.behavior.EpsilonGreedyBehavior
# MCMovementEnd.behaviorPolicy = movement.rl.behavior.UCBBehavior
# MCMovementEnd.behaviorPolicy = movement.rl.behavior.ThompsonSamplingBehavior

MCMovementEnd.learningRate = 0.01
MCMovementEnd.discountFactor = 0.99
MCMovementEnd.initialQValue = 0.0
MCMovementEnd.targetPrefix = T
MCMovementEnd.stepPenalty = 0.01
MCMovementEnd.foundReward = 10
MCMovementEnd.agentSpeed = 1
# 1 minutes sim time target regeneration period
MCMovementEnd.targetCooldown = 3600
MCMovementEnd.learningSeed = 0

# first visit = true; every visit = false
MCMovementEnd.firstVisit = true

[ EpsilonGreedyBehavior settings ]
BehaviorPolicy.EpsilonGreedy.epsilon = 1
BehaviorPolicy.EpsilonGreedy.epsilonDecay = 0.999999
BehaviorPolicy.EpsilonGreedy.minEpsilon = 0.1

[ UCBBehavior settings ]
BehaviorPolicy.UCB.explorationConstant = 2
BehaviorPolicy.UCB.resetEpisodically = false

[ TSBehavior settings ]
; BehaviorPolicy.TS.alpha = 0.01
BehaviorPolicy.TS.initialVariance = 1.0
BehaviorPolicy.TS.usingBayesian = false
BehaviorPolicy.TS.resetEpisodically = false

[ Episode persistence ]
# Episode number: override per run with -d MCMovementEnd.episodeNumber=N
EpisodicPersistenceManager.episodeNumber = 1
# Path to the persistence file. The episode-N snapshot is read at episode N+1.
# Use a fixed path (overwritten each run) or embed %%MCMovementEnd.episodeNumber%%
# for per-episode snapshots.

# this were being override in batch_runner_tele_control.py
EpisodicPersistenceManager.persistencePath = reports/skripsi/qlearn/default/_persistence.json
EpisodicPersistenceManager.saveEpisodically = true

#===========================================================================
# MOVEMENT SETTINGS
#===========================================================================
[ Movement model settings ]
# World's size (width, height; meters)
MovementModel.worldSize = 750, 750
# Warmup period (seconds)
MovementModel.warmup = 0

[ Map based movement settings ]
MapBasedMovement.nrofMapFiles = 0

#===========================================================================
# REPORT SETTINGS
#===========================================================================
[ General ]
Report.nrofReports = 1
Report.warmup = 0

Report.reportDir = reports/skripsi/qlearn/default

[ Reports ]
# Report.report1 = SearchingCoverageReport
# Report.report2 = SearchingCoverageOverTimeReport
# Report.report3 = TrajectoryFrequencyReporter
# Report.report4 = QTableReporter

# For this case, the first report should be EpisodicManagerReport, for episodic stuff.
Report.report1 = EpisodicManagerReport
; Report.report2 = TrajectoryFrequencyReporter
; Report.report3 = QTableReporter
; Report.report4 = RewardReporter
; Report.report5 = SearchingOccurrencesReporter

#===========================================================================
# ROUTER SETTINGS
#===========================================================================
[ ProphetRouter ]
ProphetRouter.secondsInTimeUnit = 30

[ SprayAndWaitRouter ]
SprayAndWaitRouter.nrofCopies = 6
SprayAndWaitRouter.binaryMode = true

[ SearchingAgentRouter ]
SearchingAgentRouter.targetMovement = StationaryPoisson       # second option
SearchingAgentRouter.targetPrefix = T

#===========================================================================
# OPTIMIZATION SETTINGS
#===========================================================================
[ Optimization ]
Optimization.connectionAlg = 2
Optimization.cellSizeMult = 5
Optimization.randomizeUpdateOrder = true

#===========================================================================
# GUI SETTINGS
#===========================================================================
[ GUI underlay image settings ]
GUI.UnderlayImage.fileName = data/spatial/shelsinki_underlay.png
GUI.UnderlayImage.offset = 64, 20
GUI.UnderlayImage.scale = 4.75
GUI.UnderlayImage.rotate = -0.015

[ GUI event log ]
GUI.EventLogPanel.nrofEvents = 200

[ Path tracing configurations ]
GUI.processNodeTrails = true    # (default: true)
GUI.nodeTrailEnabled = true     # (default: false)
GUI.nodeTrailLength = 50        # (default: 50)
GUI.nodeTrailColor = #FFA500    # (default: #808080)
GUI.nodeTrailFadeEnabled = false # (default: true)

#===========================================================================
# EVENTS SETTINGS
#===========================================================================
[ General events parameters ]
Events.nrof = 0

[ Events 1: MessageEventGenerator specific ]
Events1.class = MessageEventGenerator
# Creation interval in seconds (one new message every 25 to 35 seconds)
Events1.interval = 25,35
# Message sizes (500kB - 1MB)
Events1.size = 500k,1M
# range of message source/destination addresses
Events1.hosts = 0,9
# Message ID prefix
Events1.prefix = M

[ External events ]
ExternalEvents.nrofPreload = 500
# ExternalEvents.filePath = ee/700_events_1000_nodes_700ks.txt